services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: efms-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-efms_db}
      POSTGRES_USER: ${DB_USER:-efms}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - efms-network
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:-yonyc/efms-backend}:${BACKEND_TAG:-latest}
    container_name: efms-backend
    environment:
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-efms_db}
      DB_USER: ${DB_USER:-efms}
      DB_PASS: ${DB_PASS}
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-efms_db}
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET}
    # ports:
    #   - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - efms-network
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-yonyc/efms-frontend}:${FRONTEND_TAG:-latest}
    container_name: efms-frontend
    environment:
      NODE_ENV: production
      API_URL: ${API_URL:-http://localhost:8080}
    # ports:
    #   - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - efms-network
    restart: unless-stopped

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: efms-npm
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    depends_on:
      - frontend
      - backend
    networks:
      - efms-network
    restart: unless-stopped

networks:
  efms-network:
    driver: bridge